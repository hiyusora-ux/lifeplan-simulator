<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ライフプラン シミュレーター</title>
<style>
  :root{ --bg:#f8fafc; --card:#fff; --line:#e2e8f0; --ink:#1e293b; --sub:#64748b; --mut:#94a3b8;
    --teal:#0d9488; --teal-d:#0f766e; --tealbg:#f0fdfa; --red:#dc2626; --redbg:#fef2f2; --green:#059669; --greenbg:#ecfdf5; }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{ margin:0; background:var(--bg); color:var(--ink);
    font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  #auth-view{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .authcard{ width:100%; max-width:380px; background:var(--card); border:1px solid var(--line); border-radius:16px; padding:28px; box-shadow:0 10px 30px rgba(15,23,42,.06); }
  .authcard h1{ font-size:20px; font-weight:700; margin:0 0 4px; color:#0f172a; }
  .authcard p.sub{ font-size:13px; color:var(--sub); margin:0 0 20px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; font-weight:600; color:var(--sub); margin-bottom:5px; }
  .field input{ width:100%; border:1px solid var(--line); border-radius:9px; padding:10px 12px; font-size:14px; outline:none; }
  .field input:focus{ border-color:var(--teal); box-shadow:0 0 0 2px var(--tealbg); }
  .primary{ width:100%; background:var(--teal); color:#fff; border:0; border-radius:9px; padding:11px; font-size:14px; font-weight:700; cursor:pointer; }
  .primary:hover{ background:var(--teal-d); }
  .primary:disabled{ opacity:.6; cursor:default; }
  .switch{ text-align:center; margin-top:16px; font-size:13px; color:var(--sub); }
  .switch button{ background:none; border:0; color:var(--teal); font-weight:700; cursor:pointer; font-size:13px; }
  .msg{ font-size:12px; border-radius:8px; padding:9px 11px; margin-bottom:14px; line-height:1.5; }
  .msg.err{ background:var(--redbg); color:var(--red); }
  .msg.ok{ background:var(--greenbg); color:var(--green); }
  .hidden{ display:none !important; }
  #app-view{ height:100vh; display:flex; flex-direction:column; }
  .topbar{ display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:8px 16px; background:#fff; border-bottom:1px solid var(--line); flex:0 0 auto; }
  .topbar .brand{ font-size:14px; font-weight:700; color:#0f172a; }
  .topbar .who{ font-size:12px; color:var(--sub); }
  .topbar .save{ font-size:11px; color:var(--green); opacity:0; transition:opacity .3s; }
  .topbar .save.show{ opacity:1; }
  .ghost{ border:1px solid var(--line); background:#fff; color:var(--sub); border-radius:8px; padding:7px 12px; font-size:12px; font-weight:600; cursor:pointer; }
  .ghost:hover{ background:var(--bg); }
  #frame{ flex:1 1 auto; width:100%; border:0; }
  /* シナリオ(スナップショット)モーダル */
  .modal-bg{ position:fixed; inset:0; background:rgba(15,23,42,.45); display:flex; align-items:center; justify-content:center; padding:16px; z-index:50; }
  .modal{ width:100%; max-width:520px; max-height:82vh; overflow:auto; background:#fff; border-radius:14px; padding:20px; }
  .modal h2{ font-size:16px; margin:0 0 4px; }
  .modal .msub{ font-size:12px; color:var(--sub); margin:0 0 16px; line-height:1.6; }
  .modal-close{ float:right; background:none; border:0; font-size:20px; line-height:1; cursor:pointer; color:var(--mut); }
  .snap-new{ display:flex; gap:8px; margin-bottom:16px; }
  .snap-new input{ flex:1; border:1px solid var(--line); border-radius:8px; padding:9px 11px; font-size:13px; outline:none; }
  .snap-new input:focus{ border-color:var(--teal); box-shadow:0 0 0 2px var(--tealbg); }
  .snap-row{ border:1px solid var(--line); border-radius:10px; padding:11px 12px; margin-bottom:8px; }
  .snap-row .nm{ font-size:14px; font-weight:700; color:#0f172a; }
  .snap-row .dt{ font-size:11px; color:var(--mut); margin-top:1px; }
  .snap-acts{ display:flex; flex-wrap:wrap; gap:6px; margin-top:9px; }
  .mini-btn{ border:1px solid var(--line); background:#fff; border-radius:7px; padding:5px 10px; font-size:12px; font-weight:600; cursor:pointer; color:var(--sub); }
  .mini-btn:hover{ background:var(--bg); }
  .mini-btn.primary{ background:var(--teal); color:#fff; border-color:var(--teal); }
  .mini-btn.primary:hover{ background:var(--teal-d); }
  .mini-btn.danger{ color:var(--red); border-color:#fecaca; }
  .snap-empty{ text-align:center; color:var(--mut); font-size:13px; padding:22px 0; }
</style>
</head>
<body>

  <!-- ログイン / 新規登録 -->
  <div id="auth-view">
    <div class="authcard">
      <h1>ライフプラン シミュレーター</h1>
      <p class="sub" id="auth-sub">メールアドレス(ログインID)とパスワードでログイン</p>
      <div id="auth-msg" class="msg hidden"></div>
      <div class="field">
        <label for="email">メールアドレス（ログインID）</label>
        <input id="email" type="email" autocomplete="username" placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="password">パスワード</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="6文字以上">
      </div>
      <button class="primary" id="submit-btn">ログイン</button>
      <div class="switch">
        <span id="switch-text">アカウントをお持ちでない方は</span>
        <button id="switch-btn">新規登録</button>
      </div>
    </div>
  </div>

  <!-- 認証後アプリ -->
  <div id="app-view" class="hidden">
    <div class="topbar">
      <span class="brand">ライフプラン シミュレーター</span>
      <span class="save" id="save-indicator">✓ クラウドに保存しました</span>
      <span style="flex:1"></span>
      <span class="who" id="who"></span>
      <button class="ghost" id="scenario-btn">シナリオ</button>
      <button class="ghost" id="logout-btn">ログアウト</button>
    </div>
    <iframe id="frame" title="simulator"></iframe>
  </div>

  <!-- シナリオ(スナップショット)管理 -->
  <div id="snap-modal" class="modal-bg hidden">
    <div class="modal">
      <button class="modal-close" id="snap-close">×</button>
      <h2>シナリオ(保存プラン)</h2>
      <p class="msub">作業中のプランは常に自動保存されます。ここでは<b>名前と日付</b>を付けて区切り保存でき、複数のシナリオを切り替えて使えます。</p>
      <div class="snap-new">
        <input id="snap-name" type="text" placeholder="シナリオ名(例: 標準 / 私立進学版 / 早期退職版)">
        <button class="mini-btn primary" id="snap-save">現在を保存</button>
      </div>
      <div id="snap-list"></div>
    </div>
  </div>

<script src="config.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword,
           createUserWithEmailAndPassword, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc,
           collection, addDoc, getDocs, deleteDoc, updateDoc, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const $ = id => document.getElementById(id);
  const authView=$("auth-view"), appView=$("app-view");
  const emailEl=$("email"), passEl=$("password"), submitBtn=$("submit-btn");
  const switchText=$("switch-text"), switchBtn=$("switch-btn"), authSub=$("auth-sub"), msgEl=$("auth-msg");
  const frame=$("frame"), whoEl=$("who"), logoutBtn=$("logout-btn"), saveInd=$("save-indicator");

  let mode="login";
  let auth=null, db=null, currentUser=null;
  let iframeReady=false, cloudState=undefined, saveTimer=null;
  let latestState=null, snapshots=[];

  const cfg = window.FIREBASE_CONFIG;
  const cfgOk = cfg && cfg.apiKey && !JSON.stringify(cfg).includes("PASTE_");
  if(!cfgOk){
    showMsg("err","config.js に Firebase の構成（firebaseConfig）を設定してください。（README を参照）");
    submitBtn.disabled=true; switchBtn.disabled=true;
  } else {
    const app = initializeApp(cfg);
    auth = getAuth(app);
    db = getFirestore(app);
    onAuthStateChanged(auth, user => user ? showApp(user) : showAuth());
  }

  function showMsg(kind,text){ msgEl.className="msg "+kind; msgEl.textContent=text; msgEl.classList.remove("hidden"); }
  function clearMsg(){ msgEl.classList.add("hidden"); }

  function setMode(m){
    mode=m; clearMsg();
    if(m==="login"){
      authSub.textContent="メールアドレス(ログインID)とパスワードでログイン";
      submitBtn.textContent="ログイン"; passEl.autocomplete="current-password";
      switchText.textContent="アカウントをお持ちでない方は"; switchBtn.textContent="新規登録";
    } else {
      authSub.textContent="新しいアカウントを作成";
      submitBtn.textContent="アカウント作成"; passEl.autocomplete="new-password";
      switchText.textContent="すでにアカウントをお持ちの方は"; switchBtn.textContent="ログイン";
    }
  }
  switchBtn.addEventListener("click", ()=> setMode(mode==="login"?"signup":"login"));

  function showAuth(){
    currentUser=null; iframeReady=false; cloudState=undefined; frame.src="about:blank";
    const sm=$("snap-modal"); if(sm) sm.classList.add("hidden");
    appView.classList.add("hidden"); authView.classList.remove("hidden"); submitBtn.disabled=false;
  }

  async function showApp(user){
    currentUser=user; whoEl.textContent=user.email;
    authView.classList.add("hidden"); appView.classList.remove("hidden");
    iframeReady=false; cloudState=undefined; frame.src="simulator.html";
    try{
      const snap = await getDoc(doc(db,"plans",user.uid));
      cloudState = snap.exists() ? (snap.data().data ?? null) : null;
    }catch(e){ cloudState=null; }
    latestState = cloudState;
    maybeSendInit();
  }

  function maybeSendInit(){
    if(iframeReady && cloudState!==undefined && frame.contentWindow){
      frame.contentWindow.postMessage({type:"lifeplan:init", state:cloudState}, "*");
    }
  }

  window.addEventListener("message", (e)=>{
    const d=e.data||{};
    if(d.type==="lifeplan:ready"){ iframeReady=true; maybeSendInit(); }
    else if(d.type==="lifeplan:save"){ latestState=d.state; scheduleSave(d.state); }
  });

  function scheduleSave(stateObj){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(async ()=>{
      if(!currentUser || !db) return;
      try{
        await setDoc(doc(db,"plans",currentUser.uid), { data: stateObj, updatedAt: Date.now() });
        saveInd.classList.add("show"); setTimeout(()=>saveInd.classList.remove("show"), 1500);
      }catch(e){ /* 失敗時は次の変更で再試行 */ }
    }, 800);
  }

  async function handleSubmit(){
    if(!auth) return;
    const email=emailEl.value.trim(), password=passEl.value;
    if(!email || !password){ showMsg("err","メールアドレスとパスワードを入力してください。"); return; }
    submitBtn.disabled=true; clearMsg();
    try{
      if(mode==="login") await signInWithEmailAndPassword(auth, email, password);
      else await createUserWithEmailAndPassword(auth, email, password);
      // 成功すると onAuthStateChanged が発火してアプリ画面へ切り替わります
    }catch(err){
      showMsg("err", translateError(err && err.code));
      submitBtn.disabled=false;
    }
  }
  submitBtn.addEventListener("click", handleSubmit);
  passEl.addEventListener("keydown", e=>{ if(e.key==="Enter") handleSubmit(); });
  logoutBtn.addEventListener("click", async ()=>{ if(auth) await signOut(auth); });

  function translateError(code){
    switch(code){
      case "auth/invalid-credential":
      case "auth/wrong-password":
      case "auth/user-not-found":        return "メールアドレスまたはパスワードが違います。";
      case "auth/email-already-in-use":  return "このメールアドレスは既に登録されています。ログインしてください。";
      case "auth/weak-password":         return "パスワードは6文字以上にしてください。";
      case "auth/invalid-email":         return "メールアドレスの形式が正しくありません。";
      case "auth/operation-not-allowed": return "メール/パスワード認証が有効になっていません。Firebaseコンソールで有効化してください。";
      case "auth/admin-restricted-operation": return "新規登録は受け付けていません（家族向け設定）。管理者にアカウント作成を依頼してください。";
      case "auth/unauthorized-domain":   return "このドメインは許可されていません。Firebaseの「承認済みドメイン」に追加してください。";
      case "auth/network-request-failed":return "ネットワークエラーです。接続を確認してください。";
      case "auth/too-many-requests":     return "試行が多すぎます。しばらくしてからお試しください。";
      default: return "エラーが発生しました" + (code? "（"+code+"）":"") + "。もう一度お試しください。";
    }
  }

  // ---------- シナリオ(スナップショット) ----------
  function snapCol(){ return collection(db,"plans",currentUser.uid,"snapshots"); }
  function snapDoc(id){ return doc(db,"plans",currentUser.uid,"snapshots",id); }

  async function refreshSnaps(){
    snapshots=[];
    try{
      const qs = await getDocs(query(snapCol(), orderBy("createdAt","desc")));
      qs.forEach(d=> snapshots.push({ id:d.id, ...d.data() }));
    }catch(e){}
    renderSnaps();
  }
  function renderSnaps(){
    const list=$("snap-list");
    if(!snapshots.length){ list.innerHTML=`<div class="snap-empty">まだシナリオがありません。上の欄で「現在を保存」できます。</div>`; return; }
    list.innerHTML="";
    snapshots.forEach(s=>{
      const dt = s.createdAt ? new Date(s.createdAt).toLocaleString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}) : "";
      const row=document.createElement("div"); row.className="snap-row";
      row.innerHTML=`
        <div class="nm"></div><div class="dt">${dt}${s.updatedAt&&s.updatedAt!==s.createdAt?"（更新あり）":""}</div>
        <div class="snap-acts">
          <button class="mini-btn primary" data-a="load">呼び出す</button>
          <button class="mini-btn" data-a="over">上書き保存</button>
          <button class="mini-btn" data-a="rename">名前変更</button>
          <button class="mini-btn danger" data-a="del">削除</button>
        </div>`;
      row.querySelector(".nm").textContent = s.name || "(無題)";
      row.querySelector('[data-a="load"]').addEventListener("click",()=>loadSnap(s));
      row.querySelector('[data-a="over"]').addEventListener("click",()=>overSnap(s));
      row.querySelector('[data-a="rename"]').addEventListener("click",()=>renameSnap(s));
      row.querySelector('[data-a="del"]').addEventListener("click",()=>delSnap(s));
      list.appendChild(row);
    });
  }
  async function saveNewSnap(){
    if(!currentUser) return;
    const name=($("snap-name").value||"").trim() || ("プラン "+new Date().toLocaleDateString("ja-JP"));
    try{
      await addDoc(snapCol(), { name, data: latestState??null, createdAt: Date.now() });
      $("snap-name").value=""; await refreshSnaps();
    }catch(e){ alert("保存に失敗しました。通信状態やFirestoreのルール設定をご確認ください。"); }
  }
  async function loadSnap(s){
    if(!confirm(`「${s.name||"(無題)"}」に切り替えます。よろしいですか?\n(スナップショット未保存の変更は置き換わります)`)) return;
    cloudState = s.data ?? null; latestState = s.data ?? null;
    if(frame.contentWindow) frame.contentWindow.postMessage({type:"lifeplan:init", state:cloudState}, "*");
    try{ await setDoc(doc(db,"plans",currentUser.uid), { data: cloudState, updatedAt: Date.now() }); }catch(e){}
    closeSnap();
  }
  async function overSnap(s){
    if(!confirm(`「${s.name||"(無題)"}」を、いまの作業中プランの内容で上書きします。よろしいですか?`)) return;
    try{ await updateDoc(snapDoc(s.id), { data: latestState??null, updatedAt: Date.now() }); await refreshSnaps(); }catch(e){}
  }
  async function renameSnap(s){
    const nm=prompt("新しいシナリオ名", s.name||"");
    if(nm==null) return;
    try{ await updateDoc(snapDoc(s.id), { name:(nm.trim()||"(無題)") }); await refreshSnaps(); }catch(e){}
  }
  async function delSnap(s){
    if(!confirm(`「${s.name||"(無題)"}」を削除します。元に戻せません。`)) return;
    try{ await deleteDoc(snapDoc(s.id)); await refreshSnaps(); }catch(e){}
  }
  function openSnap(){ $("snap-modal").classList.remove("hidden"); refreshSnaps(); }
  function closeSnap(){ $("snap-modal").classList.add("hidden"); }

  $("scenario-btn").addEventListener("click", openSnap);
  $("snap-close").addEventListener("click", closeSnap);
  $("snap-save").addEventListener("click", saveNewSnap);
  $("snap-modal").addEventListener("click", e=>{ if(e.target.id==="snap-modal") closeSnap(); });

  setMode("login");
</script>
</body>
</html>
